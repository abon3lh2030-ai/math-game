<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Math Game</title>
    <style>
        /* ====================== */
        /* CSS STYLES             */
        /* ====================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: rgb(200, 0, 0);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: -webkit-fill-available; /* حل مشكلة متصفح سفاري بجوالات الآيفون */
            overflow: hidden;
        }

        /* حاوية اللعبة تأخذ مقاس الشاشة بالكامل دون أي فراغات */
        #game-container {
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            background-color: rgb(200, 0, 0);
            position: relative;
            overflow: hidden;
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            flex-direction: column;
            justify-content: space-between; /* توزيع العناصر بشكل ممتاز داخل الجوال */
            align-items: center;
            color: white;
            text-align: center;
            background-color: rgb(200, 0, 0);
            padding: 40px 20px;
        }

        .active {
            display: flex;
        }

        /* زر العودة العلوي */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: 2px solid white;
            color: white;
            padding: 5px 15px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            z-index: 10;
        }

        /* شاشة البداية */
        #screen-start { justify-content: center; }
        #screen-start h1 { font-size: 45px; margin-bottom: 40px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        
        .menu-btn {
            width: 85%;
            height: 75px;
            margin: 10px 0;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .btn-easy { background-color: #2ecc71; color: white; }
        .btn-medium { background-color: #f1c40f; color: black; }
        .btn-hard { background-color: #e74c3c; color: white; }

        /* شاشات المستويات والعد التنازلي */
        #screen-level { justify-content: center; }
        #screen-level h2 { font-size: 40px; }
        
        .count-screen { justify-content: center; }
        .count-text { font-size: 100px; font-weight: bold; }

        /* شاشة اللعبة الفعليّة */
        .game-top { width: 100%; margin-top: 20px; }
        #time-display { font-size: 30px; margin-bottom: 20px; }
        #question-display { font-size: 50px; font-weight: bold; }
        
        #answer-display {
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid white;
            color: white;
            font-size: 45px;
            text-align: center;
            width: 85%;
            min-height: 70px;
            line-height: 70px;
            border-radius: 10px;
            margin: 15px 0;
        }

        /* الكيبورد الداخلي المدمج للجوالات */
        .keyboard {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 90%;
            max-width: 340px;
            margin-bottom: 10px;
        }

        .key {
            background: rgba(255, 255, 255, 0.9);
            color: black;
            font-size: 28px;
            font-weight: bold;
            padding: 15px 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .key:active { background: #ddd; transform: scale(0.95); }
        .key.action { background: #34495e; color: white; font-size: 20px; }
        .key.submit { background: #2ecc71; color: white; font-size: 20px; grid-column: span 3; padding: 12px 0; }

        /* شاشات النتيجة */
        #screen-correct, #screen-wrong { justify-content: center; }
        .result-title { font-size: 45px; margin-bottom: 20px; }
        .info-text { font-size: 28px; margin-bottom: 15px; }
        
        .play-again-btn {
            width: 80%;
            height: 75px;
            font-size: 26px;
            background: white;
            color: black;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="screen-start" class="screen active">
            <h1>MATH GAME</h1>
            <button class="menu-btn btn-easy" onclick="selectDifficulty('easy')">EASY</button>
            <button class="menu-btn btn-medium" onclick="selectDifficulty('medium')">MEDIUM</button>
            <button class="menu-btn btn-hard" onclick="selectDifficulty('hard')">HARD</button>
        </div>

        <div id="screen-level" class="screen">
            <h2 id="level-title">EASY</h2>
        </div>

        <div id="screen-count3" class="screen count-screen"><div class="count-text">3</div></div>
        <div id="screen-count2" class="screen count-screen"><div class="count-text">2</div></div>
        <div id="screen-count1" class="screen count-screen"><div class="count-text">1</div></div>
        <div id="screen-go" class="screen count-screen"><div class="count-text">GO!</div></div>

        <div id="screen-game" class="screen">
            <div class="game-top">
                <div id="time-display">Time: 0.00 s</div>
                <div id="question-display">0 + 0 = ?</div>
            </div>
            
            <div id="answer-display"></div>
            
            <div class="keyboard">
                <button class="key" onclick="pressKey('1')">1</button>
                <button class="key" onclick="pressKey('2')">2</button>
                <button class="key" onclick="pressKey('3')">3</button>
                <button class="key" onclick="pressKey('4')">4</button>
                <button class="key" onclick="pressKey('5')">5</button>
                <button class="key" onclick="pressKey('6')">6</button>
                <button class="key" onclick="pressKey('7')">7</button>
                <button class="key" onclick="pressKey('8')">8</button>
                <button class="key" onclick="pressKey('9')">9</button>
                <button class="key action" onclick="pressKey('-')">-</button>
                <button class="key" onclick="pressKey('0')">0</button>
                <button class="key action" onclick="pressKey('back')">⌫</button>
                <button class="key submit" onclick="checkAnswer()">Confirm answer</button>
            </div>
        </div>

        <div id="screen-correct" class="screen">
            <button class="back-btn" onclick="goToStart()">BACK</button>
            <div class="result-title">CORRECT! 🎉</div>
            <div id="correct-time" class="info-text">Time: 0.00 SC</div>
            <button class="play-again-btn" onclick="restartGame()">PLAY AGAIN</button>
        </div>

        <div id="screen-wrong" class="screen">
            <button class="back-btn" onclick="goToStart()">BACK</button>
            <div class="result-title">WRONG! ❌</div>
            <div id="wrong-correct-answer" class="info-text">Correct Answer: 0</div>
            <div id="wrong-time" class="info-text">Time: 0.00 SC</div>
            <button class="play-again-btn" onclick="restartGame()">PLAY AGAIN</button>
        </div>

    </div>

    <script>
        let currentState = "start";
        let difficulty = "easy";
        let num1 = 0, num2 = 0, operator = "+", correct_answer = 0;
        let user_answer = "";
        
        let startTime = 0;
        let finalTime = 0;
        let timerInterval = null;

        const displayField = document.getElementById('answer-display');

        function changeState(newState) {
            currentState = newState;
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            
            const targetScreen = document.getElementById(`screen-${newState}`);
            if (targetScreen) targetScreen.classList.add('active');
        }

        function selectDifficulty(diff) {
            difficulty = diff;
            document.getElementById('level-title').innerText = diff.toUpperCase();
            changeState("level");

            setTimeout(() => { changeState("count3");
            setTimeout(() => { changeState("count2");
            setTimeout(() => { changeState("count1");
            setTimeout(() => { changeState("go");
            setTimeout(() => { startGameMode(); }, 1000); }, 1000); }, 1000); }, 1000); }, 1500);
        }

        function generateQuestion() {
            const opsEasy = ["+", "-"];
            const opsMedium = ["+", "-", "x", "÷"];
            const opsHard = ["+", "-", "x", "÷", "**", "square"];

            if (difficulty === "easy") {
                num1 = Math.floor(Math.random() * 20) + 1;
                num2 = Math.floor(Math.random() * 20) + 1;
                operator = opsEasy[Math.floor(Math.random() * opsEasy.length)];
            } else if (difficulty === "medium") {
                num1 = Math.floor(Math.random() * 20) + 1;
                num2 = Math.floor(Math.random() * 20) + 1;
                operator = opsMedium[Math.floor(Math.random() * opsMedium.length)];
            } else if (difficulty === "hard") {
                operator = opsHard[Math.floor(Math.random() * opsHard.length)];
                if (operator === "**") {
                    num1 = Math.floor(Math.random() * 9) + 1;
                    num2 = Math.floor(Math.random() * 4) + 2;
                    correct_answer = Math.pow(num1, num2);
                    document.getElementById('question-display').innerText = `${num1}^${num2} = ?`;
                    return;
                }
                if (operator === "square") {
                    num1 = Math.floor(Math.random() * 9) + 1;
                    correct_answer = Math.pow(num1, 2);
                    document.getElementById('question-display').innerText = `${num1}² = ?`;
                    return;
                }
                num1 = Math.floor(Math.random() * 20) + 1;
                num2 = Math.floor(Math.random() * 10) + 1;
            }

            if (operator === "+") { correct_answer = num1 + num2; } 
            else if (operator === "-") { correct_answer = num1 - num2; } 
            else if (operator === "x") { correct_answer = num1 * num2; } 
            else if (operator === "÷") {
                num1 = num2 * (Math.floor(Math.random() * 10) + 1);
                correct_answer = Math.floor(num1 / num2);
            }

            document.getElementById('question-display').innerText = `${num1} ${operator} ${num2} = ?`;
        }

        function startGameMode() {
            user_answer = "";
            displayField.innerText = "";
            generateQuestion();
            changeState("game");
            
            startTime = Date.now();
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (currentState === "game") {
                    let elapsed = (Date.now() - startTime) / 1000;
                    document.getElementById('time-display').innerText = `Time: ${elapsed.toFixed(2)} s`;
                }
            }, 50);
        }

        // معالجة الضغط على الكيبورد الداخلي الجديد
        function pressKey(key) {
            if (key === 'back') {
                user_answer = user_answer.slice(0, -1);
            } else if (key === '-') {
                // وضع إشارة السالب في البداية فقط إذا كانت الإجابة فارغة
                if (user_answer === "") user_answer = "-";
            } else {
                user_answer += key;
            }
            displayField.innerText = user_answer;
        }

        // دعم إضاف للكمبيوتر لو استخدمت لوحة مفاتيح حقيقية
        document.addEventListener('keydown', function(event) {
            if (currentState !== "game") return;
            if (event.key === "Backspace") pressKey('back');
            else if (event.key === "Enter") checkAnswer();
            else if (/^[0-9-]$/.test(event.key)) pressKey(event.key);
        });

        function checkAnswer() {
            if (user_answer === "" || user_answer === "-") return;

            clearInterval(timerInterval);
            finalTime = (Date.now() - startTime) / 1000;
            
            if (parseInt(user_answer) === correct_answer) {
                document.getElementById('correct-time').innerText = `Time: ${finalTime.toFixed(2)} SC`;
                changeState("correct");
            } else {
                document.getElementById('wrong-correct-answer').innerText = `Correct Answer: ${correct_answer}`;
                document.getElementById('wrong-time').innerText = `Time: ${finalTime.toFixed(2)} SC`;
                changeState("wrong");
            }
        }

        function goToStart() { changeState("start"); }
        function restartGame() { selectDifficulty(difficulty); }
    </script>
</body>
</html>
