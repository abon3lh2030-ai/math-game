<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Game</title>
    <style>
        /* ====================== */
        /* CSS STYLES             */
        /* ====================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* حاوية اللعبة أصبحت متجاوبة تماماً مع الجوال والكمبيوتر */
        #game-container {
            width: 100vw;
            height: 100vh;
            max-width: 500px; /* مقاس مثالي للعب على الكمبيوتر والجوال */
            max-height: 900px;
            background-color: rgb(200, 0, 0);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 0;
        }

        /* شاشات الهواتف الكبيرة تعطي حواف دائرية جميلة */
        @media (min-width: 501px) {
            #game-container {
                border-radius: 15px;
                height: 90vh;
                width: 450px;
            }
        }

        .screen {
            display: none;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            background-color: rgb(200, 0, 0);
            padding: 20px;
        }

        .active {
            display: flex;
        }

        /* زر العودة العلوي */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: none;
            border: 2px solid white;
            color: white;
            padding: 5px 15px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
        }

        /* أزرار القائمة الرئيسية */
        #screen-start h1 { 
            font-size: 45px; 
            margin-bottom: 40px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); 
        }
        
        .menu-btn {
            width: 80%;
            max-width: 300px;
            height: 80px;
            margin: 12px 0;
            font-size: 26px;
            font-weight: bold;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .menu-btn:active { transform: scale(0.95); }
        .btn-easy { background-color: #2ecc71; color: white; }
        .btn-medium { background-color: #f1c40f; color: black; }
        .btn-hard { background-color: #e74c3c; color: white; }

        /* شاشات المستويات والعد التنازلي */
        #screen-level h2 { font-size: 40px; text-transform: uppercase; }
        .count-text { font-size: 100px; font-weight: bold; animation: pulse 1s infinite; }

        @keyframes pulse {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0.5; }
        }

        /* شاشة اللعبة الفعليّة */
        #time-display { font-size: 32px; margin-bottom: 40px; }
        #question-display { font-size: 55px; font-weight: bold; margin-bottom: 30px; }
        
        #answer-input {
            background: rgba(255, 255, 255, 0.2);
            border: 3px solid white;
            color: white;
            font-size: 40px;
            text-align: center;
            width: 80%;
            max-width: 260px;
            padding: 10px;
            border-radius: 10px;
            outline: none;
            margin-bottom: 25px;
        }

        /* زر التحقق من الإجابة المضاف للجوال */
        .submit-btn {
            width: 80%;
            max-width: 260px;
            height: 60px;
            font-size: 22px;
            background-color: white;
            color: rgb(200, 0, 0);
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .submit-btn:active { transform: scale(0.95); }

        /* شاشات النتيجة */
        .result-title { font-size: 50px; margin-bottom: 25px; }
        .info-text { font-size: 30px; margin-bottom: 15px; }
        
        .play-again-btn {
            width: 80%;
            max-width: 280px;
            height: 80px;
            font-size: 30px;
            background: white;
            color: black;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 30px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="screen-start" class="screen active">
            <h1>MATH GAME</h1>
            <button class="menu-btn btn-easy" onclick="selectDifficulty('easy')">EASY</button>
            <button class="menu-btn btn-medium" onclick="selectDifficulty('medium')">MEDIUM</button>
            <button class="menu-btn btn-hard" onclick="selectDifficulty('hard')">HARD</button>
        </div>

        <div id="screen-level" class="screen">
            <h2 id="level-title">EASY</h2>
        </div>

        <div id="screen-count3" class="screen"><div class="count-text">3</div></div>
        <div id="screen-count2" class="screen"><div class="count-text">2</div></div>
        <div id="screen-count1" class="screen"><div class="count-text">1</div></div>
        <div id="screen-go" class="screen"><div class="count-text">GO!</div></div>

        <div id="screen-game" class="screen">
            <div id="time-display">Time: 0.00 s</div>
            <div id="question-display">0 + 0 = ?</div>
            <input type="tel" id="answer-input" placeholder="إجابتك هنا">
            <button class="submit-btn" onclick="checkAnswer()">تأكيد الإجابة</button>
        </div>

        <div id="screen-correct" class="screen">
            <button class="back-btn" onclick="goToStart()">BACK</button>
            <div class="result-title">CORRECT! 🎉</div>
            <div id="correct-time" class="info-text">Time: 0.00 SC</div>
            <button class="play-again-btn" onclick="restartGame()">PLAY AGAIN</button>
        </div>

        <div id="screen-wrong" class="screen">
            <button class="back-btn" onclick="goToStart()">BACK</button>
            <div class="result-title">WRONG! ❌</div>
            <div id="wrong-correct-answer" class="info-text">Correct Answer: 0</div>
            <div id="wrong-time" class="info-text">Time: 0.00 SC</div>
            <button class="play-again-btn" onclick="restartGame()">PLAY AGAIN</button>
        </div>

    </div>

    <script>
        let currentState = "start";
        let difficulty = "easy";
        let num1 = 0, num2 = 0, operator = "+", correct_answer = 0;
        
        let startTime = 0;
        let finalTime = 0;
        let timerInterval = null;

        const inputField = document.getElementById('answer-input');

        function changeState(newState) {
            currentState = newState;
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            
            const targetScreen = document.getElementById(`screen-${newState}`);
            if (targetScreen) targetScreen.classList.add('active');

            // فتح الكيبورد وعمل فوكس تلقائي عند دخول شاشة اللعبة
            if (newState === "game") {
                setTimeout(() => {
                    inputField.focus();
                }, 50);
            } else {
                inputField.blur(); // إخفاء الكيبورد في الشاشات الأخرى
            }
        }

        function selectDifficulty(diff) {
            difficulty = diff;
            document.getElementById('level-title').innerText = diff.toUpperCase();
            changeState("level");

            setTimeout(() => { changeState("count3");
            setTimeout(() => { changeState("count2");
            setTimeout(() => { changeState("count1");
            setTimeout(() => { changeState("go");
            setTimeout(() => { startGameMode(); }, 1000); }, 1000); }, 1000); }, 1000); }, 1500);
        }

        function generateQuestion() {
            const opsEasy = ["+", "-"];
            const opsMedium = ["+", "-", "x", "÷"];
            const opsHard = ["+", "-", "x", "÷", "**", "square"];

            if (difficulty === "easy") {
                num1 = Math.floor(Math.random() * 20) + 1;
                num2 = Math.floor(Math.random() * 20) + 1;
                operator = opsEasy[Math.floor(Math.random() * opsEasy.length)];
            } else if (difficulty === "medium") {
                num1 = Math.floor(Math.random() * 20) + 1;
                num2 = Math.floor(Math.random() * 20) + 1;
                operator = opsMedium[Math.floor(Math.random() * opsMedium.length)];
            } else if (difficulty === "hard") {
                operator = opsHard[Math.floor(Math.random() * opsHard.length)];
                if (operator === "**") {
                    num1 = Math.floor(Math.random() * 9) + 1;
                    num2 = Math.floor(Math.random() * 4) + 2;
                    correct_answer = Math.pow(num1, num2);
                    document.getElementById('question-display').innerText = `${num1}^${num2} = ?`;
                    return;
                }
                if (operator === "square") {
                    num1 = Math.floor(Math.random() * 9) + 1;
                    correct_answer = Math.pow(num1, 2);
                    document.getElementById('question-display').innerText = `${num1}² = ?`;
                    return;
                }
                num1 = Math.floor(Math.random() * 20) + 1;
                num2 = Math.floor(Math.random() * 10) + 1;
            }

            if (operator === "+") { correct_answer = num1 + num2; } 
            else if (operator === "-") { correct_answer = num1 - num2; } 
            else if (operator === "x") { correct_answer = num1 * num2; } 
            else if (operator === "÷") {
                num1 = num2 * (Math.floor(Math.random() * 10) + 1);
                correct_answer = Math.floor(num1 / num2);
            }

            document.getElementById('question-display').innerText = `${num1} ${operator} ${num2} = ?`;
        }

        function startGameMode() {
            inputField.value = "";
            generateQuestion();
            changeState("game");
            
            startTime = Date.now();
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (currentState === "game") {
                    let elapsed = (Date.now() - startTime) / 1000;
                    document.getElementById('time-display').innerText = `Time: ${elapsed.toFixed(2)} s`;
                }
            }, 50);
        }

        // دالة التحقق من الإجابة (تُستدعى بالزر أو بـ Enter)
        function checkAnswer() {
            let user_answer = inputField.value.trim();
            if (user_answer === "") return;

            clearInterval(timerInterval);
            finalTime = (Date.now() - startTime) / 1000;
            
            if (parseInt(user_answer) === correct_answer) {
                document.getElementById('correct-time').innerText = `Time: ${finalTime.toFixed(2)} SC`;
                changeState("correct");
            } else {
                document.getElementById('wrong-correct-answer').innerText = `Correct Answer: ${correct_answer}`;
                document.getElementById('wrong-time').innerText = `Time: ${finalTime.toFixed(2)} SC`;
                changeState("wrong");
            }
        }

        // دعم زر Enter من كيبورد الجوال أو الكمبيوتر
        inputField.addEventListener('keydown', function(event) {
            if (event.key === "Enter") {
                checkAnswer();
            }
        });

        function goToStart() {
            changeState("start");
        }

        function restartGame() {
            selectDifficulty(difficulty);
        }
    </script>
</body>
</html>
